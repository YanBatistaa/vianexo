name: Build and release ViaNexo

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Notas da versao"
        required: false
        default: ""
      channel:
        description: "Canal da release"
        type: choice
        required: true
        default: "stable"
        options:
          - stable
          - beta

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Smoke test
        run: npm run test:smoke

      - name: Permission test
        run: npm run test:permissions

      - name: Contract test
        run: npm run test:contracts

      - name: Migration test
        run: npm run test:migrations

      - name: Generate changelog
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          npm run release:changelog -- --version=$version --channel=${{ inputs.channel }}

      - name: Build installer
        run: npm run package

      - name: Normalize updater asset names
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $spacedExe = "release/ViaNexo Setup $version.exe"
          $spacedBlockmap = "release/ViaNexo Setup $version.exe.blockmap"
          $hyphenExe = "release/ViaNexo-Setup-$version.exe"
          $hyphenBlockmap = "release/ViaNexo-Setup-$version.exe.blockmap"
          if ((Test-Path $spacedExe) -and -not (Test-Path $hyphenExe)) {
            Copy-Item $spacedExe $hyphenExe -Force
          }
          if ((Test-Path $spacedBlockmap) -and -not (Test-Path $hyphenBlockmap)) {
            Copy-Item $spacedBlockmap $hyphenBlockmap -Force
          }
          if (Test-Path "release/latest.yml") {
            (Get-Content release/latest.yml) -replace [regex]::Escape("ViaNexo Setup $version.exe"), "ViaNexo-Setup-$version.exe" | Set-Content release/latest.yml
          }

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
          RELEASE_CHANNEL: ${{ inputs.channel }}
        run: |
          $version = node -p "require('./package.json').version"
          $tag = if ($env:RELEASE_CHANNEL -eq "beta") { "v$version-beta" } else { "v$version" }
          $notesFile = "releases/v$version.md"
          git tag $tag
          git push origin $tag
          $extraArgs = @()
          if ($env:RELEASE_CHANNEL -eq "beta") { $extraArgs += "--prerelease" }
          if ($env:RELEASE_NOTES) {
            $notes = $env:RELEASE_NOTES
          } else {
            $notes = Get-Content $notesFile -Raw
          }
          gh release create $tag `
            "release/ViaNexo-Setup-$version.exe" `
            "release/ViaNexo-Setup-$version.exe.blockmap" `
            "release/latest.yml" `
            --title "ViaNexo $version" `
            --notes "$notes" `
            @extraArgs
